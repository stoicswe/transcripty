name: Transcripty
options:
  bundleIdPrefix: com.transcripty
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: P22P7U46RW

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.14.0"

targets:
  Transcripty:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
    dependencies:
      - package: FluidAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.transcripty.Transcripty
        PRODUCT_NAME: Transcripty
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/Transcripty.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: YES
